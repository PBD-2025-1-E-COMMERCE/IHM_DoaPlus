{% load static %}

<header id="header" class="header d-flex align-items-center fixed-top">
    <div class="container-fluid container-xl d-flex align-items-center">

        <!-- Logo -->
        <a href="{% if company %}{% url 'ecommerce:company_page' company.id_company %}{% else %}{% url 'ecommerce:index' %}{% endif %}"
            class="logo d-flex align-items-center me-auto">

            {% if company and company.logo %}
            <img src="{{ company.logo.url }}" alt="{{ company.nome }}" class="logo-img">
            {% else %}
            <div class="d-flex align-items-center">
                <h1 class="sitename mb-0">Doa</h1>
                <span class="ms-1 text-warning fs-2">+</span>
            </div>
            {% endif %}
        </a>

        <!-- Menu -->
        <nav id="navmenu" class="navmenu mx-auto">
            <ul>
                <li>
                    <a href="{% url 'ecommerce:index' %}" class="active">
                        Inicio
                    </a>
                </li>

                <li>
                    <a href="{% url 'ecommerce:companies' %}">
                        Lojas parceiras
                    </a>
                </li>

                <li class="dropdown">
                    <a href="#">
                        <span>Ajudar</span>
                        <i class="bi bi-chevron-down toggle-dropdown"></i>
                    </a>

                    <ul>
                        <li>
                            <a href="{% url 'ecommerce:category_page' 1 %}">
                                Causas
                            </a>
                        </li>

                        <li>
                            <a href="{% url 'ecommerce:category_page' 2 %}">
                                ONGs
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>

            <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
        </nav>

        <!-- Busca + Usuário -->
        <div class="d-flex align-items-center gap-3 ms-auto flex-nowrap">

            <!-- Busca (desktop apenas) -->
            <form method="get" action="" class="d-none d-md-block">
                <input type="search" name="q" class="form-control" placeholder="Buscar..." aria-label="Search"
                    style="width:220px; color:#000;">
            </form>

            {% if user.is_authenticated %}

            <!-- Saudação + Perfil -->
            <div class="d-flex align-items-center gap-2">

                <span class="text-white d-none d-lg-inline">
                    Olá, {{ user.first_name }}!
                </span>

                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle"
                        data-bs-toggle="dropdown" aria-expanded="false">

                        <img src="{% static 'assets/img/people.png' %}" width="35" height="35" class="rounded-circle"
                            alt="Perfil">
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <a class="dropdown-item" href="{% url 'ecommerce:home' %}">
                                Meus Cupons
                            </a>
                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item" href="{% url 'ecommerce:create_campanha' %}">
                                Minhas campanhas
                            </a>
                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item" href="{% url 'authentication:logout' %}">
                                Sair
                            </a>
                        </li>

                    </ul>
                </div>

            </div>

            {% else %}

            <a class="btn btn-outline-warning" href="{% url 'authentication:login' %}">
                Login
            </a>

            {% endif %}

        </div>

    </div>
</header>
