{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
    <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">
    <link href="{% static 'assets/css/dashboard.css' %}" rel="stylesheet">
</head>

<body>
    <!-- Sidebar -->
    <nav class="sidebar d-flex flex-column position-fixed">
        <div class="py-4 px-3 mb-4 border-bottom text-center">
            <span class="fs-4 fw-bold">Menu</span>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="/dash/list_companies/" data-url="/dash/list_companies/">
                    <i class="bi bi-building"></i>
                    <span>Empresa</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/dash/list_itens/" data-url="/dash/list_itens/">
                    <i class="bi bi-box-seam"></i>
                    <span>Itens</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/dash/list_users/" data-url="/dash/list_users/">
                    <i class="bi bi-list"></i>
                    <span>Usuário</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Header com ícone de perfil -->
    <header class="header d-flex justify-content-end align-items-center px-4"
        style="left: 0; width: 100%; height: 56px; position: fixed; top: 0; background-color: #fff; z-index: 999;">
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" id="dropdownUser"
                data-bs-toggle="dropdown" aria-expanded="false">
                <div class="profile-circle bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 36px; height: 36px;">
                    <i class="bi bi-person-fill"></i>
                </div>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownUser">
                <li><a class="dropdown-item" href="#">Perfil</a></li>
                <li><a class="dropdown-item" href="{% url 'authentication:logout' %}">Sair</a></li>
            </ul>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" style="padding-top: 80px; margin-left: 200px;">
        <div class="container-fluid">
            <div class="row">
                <div class="col">
                    <div id="conteudo-central">
                        <h1 class="mb-4">Bem-vindo ao Dashboard</h1>
                        <div class="alert alert-info" role="alert">
                            Selecione uma opção no menu lateral para começar.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script>
        // Navegação dinâmica sem reload
        document.querySelectorAll('.nav-link[data-url]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const url = this.getAttribute('data-url');

                window.history.pushState({ url: url }, '', url);

                fetch(url)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Erro ao carregar conteúdo.');
                        }
                        return response.text();
                    })
                    .then(html => {
                        document.getElementById('conteudo-central').innerHTML = html;
                    })
                    .catch(error => {
                        document.getElementById('conteudo-central').innerHTML = `
                            <div class="alert alert-danger" role="alert">
                                ${error.message}
                            </div>`;
                    });
            });
        });

        // Suporte ao botão voltar/avançar
        window.addEventListener('popstate', (event) => {
            const url = window.location.pathname;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Erro ao carregar conteúdo.');
                    }
                    return response.text();
                })
                .then(html => {
                    document.getElementById('conteudo-central').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('conteudo-central').innerHTML = `
                        <div class="alert alert-danger" role="alert">
                            ${error.message}
                        </div>`;
                });
        });
    </script>
</body>

</html>
