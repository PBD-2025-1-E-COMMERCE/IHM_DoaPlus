{% block body %}
<h1>tela de login</h1>
<form action="" method="post">
    {% csrf_token %}
    <div>
        <label for="{{ form.username.id_for_label }}">Usuário:</label>
        {{ form.username }}
    </div>
    <div>
        <label for="{{ form.password.id_for_label }}">Password:</label>
        {{ form.password}}
    </div>
    </div>
    <button>Entrar</button>
</form>
{% endblock %}
